name: company-network-project

topology:
  nodes:
    # --- SÉCURITÉ (FIREWALL OPEN SOURCE) ---
    ENT-FIREWALL:
      kind: linux
      image: alpine:latest
      # Ces commandes s'exécutent au démarrage pour le transformer en routeur/pare-feu
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - apk update
        - apk add iptables
        - ip addr add 192.168.0.1/30 dev eth1
        - ip addr add 120.0.0.102/30 dev eth2
        - ip route add 192.168.10.0/24 via 192.168.0.2
        - ip route add 192.168.20.0/24 via 192.168.0.2
        - ip route add 192.168.30.0/24 via 192.168.0.2
        - ip route del default
        - ip route add default via 120.0.0.101

        # NAT (Masquerade)
        - iptables -t nat -A POSTROUTING -o eth2 -j MASQUERADE

        # Politique stricte : on bloque tout ce qui traverse par défaut
        - iptables -P FORWARD DROP

        # Autoriser les paquets de retour (vital pour recevoir les réponses DNS/Ping)
        - iptables -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT

        # ---------------------------------------------------------
        # AUTORISATIONS STRICTES : UNIQUEMENT VERS LE SERVEUR DNS
        # ---------------------------------------------------------

        # 1. Autoriser le Ping (ICMP) SEULEMENT vers l'IP du serveur DNS
        - iptables -A FORWARD -i eth1 -o eth2 -p icmp -s 192.168.0.0/16 -d 120.0.100.1 -j ACCEPT

        # 2. Autoriser les requêtes DNS (UDP et TCP port 53) SEULEMENT vers l'IP du serveur DNS
        - iptables -A FORWARD -i eth1 -o eth2 -p udp --dport 53 -s 192.168.0.0/16 -d 120.0.100.1 -j ACCEPT
        - iptables -A FORWARD -i eth1 -o eth2 -p tcp --dport 53 -s 192.168.0.0/16 -d 120.0.100.1 -j ACCEPT

        - iptables -A FORWARD -i eth1 -o eth2 -p tcp --dport 80 -s 192.168.0.0/16 -j ACCEPT
        - iptables -A FORWARD -i eth1 -o eth2 -p tcp --dport 443 -s 192.168.0.0/16 -j ACCEPT

    # --- CŒUR DE RÉSEAU (SWITCH L3 ARISTA) ---
    ENT-COR-01:
      kind: arista_ceos
      image: ceos:4.30.2

    # --- SERVEURS ---
    SRV-WEB:
      kind: linux
      image: alpine:latest
      exec:
        - apk update
        - apk add apache2
        - mkdir -p /run/apache2
        - httpd -k start
        - ip addr add 192.168.10.10/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.10.254
      binds:
        - web-server/:/var/www/localhost/htdocs/

    SRV-VOIP:
      kind: linux
      # Image Docker communautaire populaire et stable pour Asterisk
      image: andrius/asterisk:latest
      binds:
        - ./asterisk-config:/etc/asterisk
      cmd: sleep infinity
      exec:
        - apt-get update
        - apt-get install -y iproute2
        - ip addr add 192.168.30.10/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.30.254
        - asterisk -rx "core reload"
        - asterisk

    # --- CLIENTS ---
    CLIENT-PC:
      kind: linux
      image: alpine:latest

      exec:
        - apk update
        - apk add curl
        - ip addr add 192.168.20.10/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.20.254

    CLIENT-PHONE1:
      kind: linux
      image: alpine:latest
      binds:
        - ./asterisk-client/phone1:/root/.baresip
      exec:
        - apk update
        - apk add baresip --repository=http://dl-cdn.alpinelinux.org/alpine/edge/testing/ --repository=http://dl-cdn.alpinelinux.org/alpine/edge/main/ --repository=http://dl-cdn.alpinelinux.org/alpine/edge/community/
        - ip addr add 192.168.30.11/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.30.254
        #- baresip -f /root/.baresip

    CLIENT-PHONE2:
      kind: linux
      image: alpine:latest
      binds:
        - ./asterisk-client/phone2:/root/.baresip
      exec:
        - apk update
        - apk add baresip --repository=http://dl-cdn.alpinelinux.org/alpine/edge/testing/ --repository=http://dl-cdn.alpinelinux.org/alpine/edge/main/ --repository=http://dl-cdn.alpinelinux.org/alpine/edge/community/
        - ip addr add 192.168.30.21/24 dev eth1
        - ip route del default
        - ip route add default via 192.168.30.254
        #- baresip -f /root/.baresip

    ##########################################################################
    ##########################################################################
    # AS routers and additional hosts
    AS-R1:
      kind: arista_ceos
      image: ceos:4.30.2

    AS-R2:
      kind: arista_ceos
      image: ceos:4.30.2

    AS-R3:
      kind: arista_ceos
      image: ceos:4.30.2

    SRV-DNS:
      kind: linux
      image: ubuntu/bind9:latest
      binds:
        # On lie tes fichiers locaux aux fichiers du conteneur
        - ./dns-config/named.conf:/etc/bind/named.conf
        - ./dns-config/db.entreprise.lab:/etc/bind/db.entreprise.lab
      exec:
        # Configuration de l'IP sur l'interface eth1 (reliée à AS-R3)
        - ip addr add 120.0.100.1/24 dev eth1
        - ip route del default
        # Route par défaut pour que le DNS puisse répondre vers Internet/BGP
        - ip route add default via 120.0.100.254

    PARTICULIER-ENT:
      kind: linux
      image: alpine:latest
      exec:
        - apk update
        - apk add curl

  links:
    # Interconnexion entre le Pare-feu VyOS (eth1) et le Switch Core Arista (eth1)
    - endpoints: ["ENT-FIREWALL:eth1", "ENT-COR-01:eth1"]

    # Connexion des serveurs sur le Switch Core
    - endpoints: ["ENT-COR-01:eth2", "SRV-WEB:eth1"]
    - endpoints: ["ENT-COR-01:eth3", "SRV-VOIP:eth1"]

    # Connexion des postes clients sur le Switch Core
    - endpoints: ["ENT-COR-01:eth5", "CLIENT-PC:eth1"]
    - endpoints: ["ENT-COR-01:eth6", "CLIENT-PHONE1:eth1"]
    - endpoints: ["ENT-COR-01:eth7", "CLIENT-PHONE2:eth1"]

    # Interconnexion entre les routeurs AS et le Switch Core
    - endpoints: ["AS-R1:eth1", "ENT-FIREWALL:eth2"]
    - endpoints: ["AS-R1:eth2", "AS-R2:eth1"]
    - endpoints: ["AS-R1:eth3", "AS-R3:eth1"]
    #
    - endpoints: ["AS-R2:eth2", "AS-R3:eth2"]
    - endpoints: ["AS-R3:eth3", "SRV-DNS:eth1"]
    - endpoints: ["AS-R2:eth3", "PARTICULIER-ENT:eth1"]

    #ports externes
    - endpoints: ["AS-R1:eth4", "macvlan:enp1s0f0"] #entreprise
    - endpoints: ["AS-R2:eth4","macvlan:enp1s0f1"] #particulier
    - endpoints: ["AS-R3:eth4","macvlan:enp1s0f2"] #bgp 
