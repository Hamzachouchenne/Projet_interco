no aaa root
!
username admin privilege 15 role network-admin secret sha512 $6$otc98bWB4ADHy3it$HVANXNWivAUiZ2YVpeEr8ZK10yj/UqhEy2M.Y7SDyLMa/jRKKWJ39OlA/1sbZ0QsA/cxrmNxOtLtBm87XrcsC1
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname AS-R2
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
management api http-commands
   no shutdown
!
management api gnmi
   transport grpc default
!
management api netconf
   transport ssh default
!
interface Ethernet1
   description lien_vers_AS_R1
   no switchport
   ip address 120.0.0.2/30
   ip ospf network point-to-point
   ip ospf mtu-ignore
!
interface Ethernet2
   description lien_vers_AS_R3
   no switchport
   ip address 120.0.0.5/30
   ip ospf network point-to-point
   ip ospf mtu-ignore
!
interface Ethernet3
   description lien_vers_particulier
   no switchport
   ip address 120.0.2.1/30
   ip ospf network point-to-point
   ip ospf mtu-ignore
!
interface Loopback0
   ip address 120.0.15.2/32
!
ip routing
!
ip name-server 120.0.100.1
!
router ospf 10
   network 120.0.0.0/30 area 0.0.0.0
   network 120.0.0.4/30 area 0.0.0.0
   network 120.0.2.0/30 area 0.0.0.0
   network 120.0.15.2/32 area 0.0.0.0
   max-lsa 12000
!
end
