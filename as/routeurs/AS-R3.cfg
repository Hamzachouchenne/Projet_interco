no aaa root
!
username admin privilege 15 role network-admin secret sha512 $6$SPzhFDjv.hIB4ojH$h86UACAsgicw9kYnnzGBvGZ1QB4mJJa3vUlX2bShSnDnEH0.XBCyr5UYHK3OnMRIBPmwCyaAul1xt7GdcAExG/
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname AS-R3
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
management api http-commands
   no shutdown
!
management api gnmi
   transport grpc default
!
management api netconf
   transport ssh default
!
interface Ethernet1
   description lien_vers_AS_R1
   no switchport
   ip address 120.0.0.10/30
   ip ospf network point-to-point
   ip ospf mtu-ignore
!
interface Ethernet2
   description lien_vers_AS_R2
   no switchport
   ip address 120.0.0.6/30
   ip ospf network point-to-point
   ip ospf mtu-ignore
!
interface Ethernet3
   description lien_vers_SW_SERVERS
   no switchport
   ip address 120.0.14.1/24
!
interface Ethernet4
   description lien_vers_bgp
   no switchport
   ip address 120.0.0.13/30
   ip ospf network point-to-point
   ip ospf mtu-ignore
!
interface Loopback0
   ip address 120.0.15.3/32
!
ip routing
!
ip name-server 120.0.14.2
!
router ospf 10
   network 120.0.0.8/30 area 0.0.0.0
   network 120.0.0.4/30 area 0.0.0.0
   network 120.0.0.12/30 area 0.0.0.0
   network 120.0.14.0/24 area 0.0.0.0
   network 120.0.15.3/32 area 0.0.0.0
   max-lsa 12000
!
end
