# ===================================================================
# auth-ldap.conf - Plugin LDAP pour OpenVPN (openvpn-auth-ldap)
# Serveur LDAP interne : ldap://192.168.10.20:389
# ===================================================================

<LDAP>
    # URI du serveur LDAP (annuaire interne de l'AS 10)
    URL             ldap://192.168.10.20:389

    # Délai d'attente de connexion en secondes
    Timeout         15

    # TLS désactivé : connexion plaintext sur le réseau interne de confiance
    # Pour activer LDAPS, remplacer l'URL par ldaps:// et mettre TLSEnable yes
    TLSEnable       no

    # Compte de service pour les recherches (décommenter si l'annuaire l'exige)
    # BindDN          cn=openvpn-service,ou=services,dc=le-loup-tres-mechant,dc=fr
    # BindPassword    mot_de_passe_service_ici

    # Ne pas suivre les redirections LDAP (referrals)
    FollowReferrals no
</LDAP>

<Authorization>
    # Base de recherche : l'OU qui contient les comptes utilisateurs
    BaseDN          "ou=utilisateurs,dc=le-loup-tres-mechant,dc=fr"

    # Filtre : %u est remplacé par le login fourni par le client VPN
    # Authentification par l'attribut uid (ex: uid=jean.dupont)
    SearchFilter    "(uid=%u)"

    # Pas de vérification d'appartenance à un groupe LDAP
    # Pour restreindre l'accès VPN à un groupe spécifique, mettre yes
    # et décommenter RequireGroup + GroupDN ci-dessous
    RequireGroup    false

    # <Group>
    #     BaseDN      "ou=groupes,dc=le-loup-tres-mechant,dc=fr"
    #     SearchFilter "(cn=vpn-autorises)"
    #     MemberAttribute memberUid
    # </Group>
</Authorization>
