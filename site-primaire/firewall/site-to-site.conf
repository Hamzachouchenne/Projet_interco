# ===================================================================
# site-to-site.conf - Tunnel VPN Permanent vers AS 13
# Port UDP 1195 | Interface tun1 | Clé Partagée Statique (PSK)
# ===================================================================
#
# PRÉREQUIS - Génération et échange de la clé statique (une seule fois)
# ---------------------------------------------------------------
# 1. Sur CE routeur (AS 10), générer la clé :
#       openvpn --genkey secret /etc/openvpn/keys/secret.key
#
# 2. Copier secret.key vers le routeur AS 13 de façon SÉCURISÉE
#    (SCP sur un canal chiffré, jamais en clair sur le réseau)
#
# 3. Le routeur AS 13 doit utiliser la même clé avec les rôles inversés :
#       remote  <IP_PUBLIQUE_AS10>  1195
#       ifconfig 10.255.255.2 10.255.255.1   (IPs inversées)
#       secret /etc/openvpn/secret.key
# ---------------------------------------------------------------

# Protocole et port d'écoute
proto udp
port  1195

# Interface tunnel dédiée (tun1 = réservé au VPN Site-à-Site)
dev tun1

# Adresses IP Point-à-Point du tunnel
#   Local  (AS 10) : 10.255.255.1
#   Distant (AS 13) : 10.255.255.2
ifconfig 10.255.255.1 10.255.255.2

# Clé partagée statique (PSK)
secret /etc/openvpn/keys/secret.key

# Route vers le réseau LAN de l'AS 13
route 192.168.50.0 255.255.255.0

# --- SÉCURITÉ ---
# AES-256-CBC : seul cipher supporté nativement en mode PSK (pas de TLS)
cipher AES-256-CBC

# Keepalive : ping toutes les 10s, considère le tunnel mort après 60s
keepalive 10 60

# Persistance lors des rechargements
persist-key
persist-tun

# --- LOGS ---
log-append /var/log/openvpn/site-to-site.log
verb 3
