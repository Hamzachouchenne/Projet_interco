# ===================================================================
# server-nomade.conf - OpenVPN Road Warrior pour Télétravailleurs
# Port UDP 1194 | Interface tun0
# Authentification : LDAP uniquement (login/mot de passe)
# Le fichier client est dans clients/vpn-nomade.ovpn
# ===================================================================

# Mode Serveur
mode server
tls-server

# Protocole et port
proto udp
port 1194

# Interface tunnel (tun0 = réservé au VPN Nomade)
dev tun0

# Pool d'adresses IP attribuées aux clients VPN
server 10.8.0.0 255.255.255.0

# Mémorise l'association client <-> IP entre les reconnexions
ifconfig-pool-persist /var/log/openvpn/ipp-nomade.txt

# --- PKI ---
ca   /etc/openvpn/pki/ca.crt
cert /etc/openvpn/pki/server.crt
key  /etc/openvpn/pki/server.key
dh   none
crl-verify /etc/openvpn/pki/crl.pem

# Clé HMAC anti-DDoS (TLS Auth) : côté serveur = direction 0
tls-auth /etc/openvpn/pki/ta.key 0

# --- AUTHENTIFICATION LDAP ---
# Le plugin openvpn-auth-ldap interroge le serveur LDAP interne
plugin /usr/lib/openvpn/plugins/openvpn-plugin-auth-ldap.so /etc/openvpn/auth-ldap.conf

# Authentification LDAP seule — pas de certificat client requis
# L'utilisateur entre son login/mot de passe LDAP à la connexion
verify-client-cert none
username-as-common-name

# --- ROUTES POUSSÉES AUX CLIENTS (split tunneling) ---
# Les clients n'accèdent qu'aux réseaux internes via le VPN (pas de full-tunnel)
push "route 192.168.10.0 255.255.255.0"   # Réseau Serveurs
push "route 192.168.20.0 255.255.255.0"   # Réseau Clients
push "route 192.168.30.0 255.255.255.0"   # Réseau VoIP

# Pousser les DNS internes si disponibles
# push "dhcp-option DNS 192.168.10.11"

# --- SÉCURITÉ ---
cipher AES-256-GCM
auth   SHA256
tls-version-min 1.2

# Keepalive : ping toutes les 10s, considère mort après 120s
keepalive 10 120

# Réduction des privilèges après initialisation
user  nobody
group nobody

# Persistance des handles clés/tunnel lors des rechargements (SIGHUP)
persist-key
persist-tun

# Nombre max de clients simultanés
max-clients 50

# --- LOGS ---
status   /var/log/openvpn/nomade-status.log 30
log-append /var/log/openvpn/nomade.log
verb 3
