# ===================================================================
# site-to-site.conf - Site Secondaire : client VPN vers Site Primaire
# Port UDP 1195 | Interface tun0 | Clé Partagée Statique (PSK)
# ===================================================================
#
# La clé secret.key est générée sur le site primaire et copiée ici
# via prepare.sh. Ne jamais transmettre la clé en clair.
# ===================================================================

proto udp
port  1195

dev tun0

# Se connecte au firewall du site primaire (IP WAN publique AS-R1)
remote 120.0.1.2 1195

# Adresses IP Point-à-Point du tunnel (inversées par rapport au serveur)
#   Local  (site secondaire) : 10.255.255.2
#   Distant (site primaire)  : 10.255.255.1
ifconfig 10.255.255.2 10.255.255.1

# Clé PSK partagée avec le site primaire
secret /etc/openvpn/keys/secret.key

# Routes vers les réseaux internes du site primaire via le tunnel
route 192.168.10.0 255.255.255.0   # Serveurs primaires
route 192.168.20.0 255.255.255.0   # Clients primaires
route 192.168.30.0 255.255.255.0   # VoIP primaire

cipher AES-256-CBC
data-ciphers AES-256-CBC
keepalive 10 60
persist-key
persist-tun

log-append /var/log/openvpn/site-to-site.log
verb 3
