# ===================================================================
# site-to-site.conf - Site Secondaire : tunnel VPN vers Site Primaire
# Port UDP 1195 | Interface tun0 | Clé PSK générée par prepare.sh
# ===================================================================

proto udp
port  1195

dev tun0

# Se connecte au firewall du site primaire
remote 203.0.113.1 1195

# IPs Point-à-Point (inversées par rapport au site primaire)
#   Local  (site secondaire) : 10.255.255.2
#   Distant (site primaire)  : 10.255.255.1
ifconfig 10.255.255.2 10.255.255.1

# Clé PSK déposée par prepare.sh
secret /etc/openvpn/keys/secret.key

# Routes vers les réseaux internes du site primaire
route 192.168.10.0 255.255.255.0   # Serveurs
route 192.168.20.0 255.255.255.0   # Clients
route 192.168.30.0 255.255.255.0   # VoIP

cipher AES-256-CBC
keepalive 10 60
persist-key
persist-tun

log-append /var/log/openvpn/s2s.log
verb 3
